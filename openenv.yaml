name: real-world-agent-eval
version: "1.0.0"
description: >
  A real-world AI agent evaluation environment with three tasks of increasing
  difficulty: email triage (easy), data cleaning (medium), and code review (hard).
  Implements the OpenEnv interface with Pydantic-typed observations, actions,
  and rewards including intermediate reward signals.

tags:
  - openenv
  - agent-eval
  - nlp
  - code-review
  - data-cleaning

tasks:
  - id: email_triage
    difficulty: easy
    description: Classify 10 emails by priority (urgent/normal/low) and category (action_required/fyi/spam/newsletter)
    max_steps: 1
    reward_range: [-1.0, 1.0]

  - id: data_cleaning
    difficulty: medium
    description: Fix a messy CSV with nulls, type errors, duplicates, inconsistent casing, and outliers
    max_steps: 10
    reward_range: [0.0, 1.0]

  - id: code_review
    difficulty: hard
    description: Review a Python PR diff with 5 seeded bugs (SQL injection, off-by-one, mutable default, missing auth, division by zero)
    max_steps: 15
    reward_range: [-1.0, 1.0]

environment:
  python: ">=3.10"
  framework: openenv
  entrypoint: "environment.env:OpenEnvEnvironment"

inference:
  script: inference.py
  requires_env:
    - HF_TOKEN
  optional_env:
    - HF_BASE_URL
    - MODEL_ID
  default_model: meta-llama/Meta-Llama-3.1-8B-Instruct
  default_base_url: https://router.huggingface.co/v1
